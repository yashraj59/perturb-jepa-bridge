name: eval-retrieval
model:
  shared_dim: 256
  num_bag_prototypes: 8
  rna_encoder_dim: 128
  image_encoder_dim: 128
data:
  rna_bag_size: 128
  image_bag_size: 128
  min_rna_bag_size: 16
  min_image_bag_size: 16
  biological_keys:
    - perturbation
    - dose
    - time
    - cell_line
  technical_keys:
    - batch
    - plate
    - run
    - well
    - site
    - z_plane
    - sequencing_lane
    - library_id
loss:
  contrastive_weight: 1.0
  mmd_weight: 0.1
  sliced_wasserstein_weight: 0.05
  batch_adv_weight: 0.05
  perturbation_cls_weight: 0.1
  counterfactual_nll_weight: 1.0
  counterfactual_mmd_weight: 0.1
  temperature: 0.07
training:
  batch_size: 32
  epochs: 1
  lr: 0.001
  weight_decay: 0.01
  batch_adv_warmup_epochs: 5
  freeze_encoders_initially: true
inputs:
  rna_embeddings: rna_embeddings.npy
  rna_metadata: rna_metadata.csv
  image_embeddings: image_embeddings.npy
  image_metadata: image_metadata.csv
labels:
  label_col: condition_key
  condition_cols: [perturbation, dose, time, cell_line]
metrics:
  directions: [rna_to_image, image_to_rna]
  recall_k: [1, 5, 10]
  mean_average_precision: true
  median_rank: true
  same_moa_enrichment: true
  same_perturbation_enrichment: true
  enrichment_k: 10
stratification:
  columns: [batch, perturbation, dose, time, cell_line]
baselines:
  metadata_only:
    columns: [perturbation, dose, time, cell_line]
  batch_only:
    columns: [batch, plate, run, well, site, z_plane, imaging_channel, sequencing_lane, library_id]
  mean_prototype_alignment:
    groupby: [perturbation, dose, time, cell_line]
output: retrieval_metrics.csv
