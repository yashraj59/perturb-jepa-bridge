name: lincs_l1000_cellpainting_a549_profiles
model:
  rna:
    vocab_size: 978
    dim: 256
    depth: 4
    heads: 8
    max_genes: 978
  image:
    in_channels: 1
    image_size: 36
    patch_size: 6
    dim: 256
    depth: 4
    heads: 8
  perturbation:
    num_perturbations: 1600
    num_types: 4
    num_cell_lines: 4
    num_batches: 256
    dim: 128
  shared_dim: 256
  num_bag_prototypes: 8
optimizer:
  lr: 0.0003
  weight_decay: 0.05
training:
  steps: 2000
  batch_size: 16
  device: cuda
  seed: 13
  ema_decay: 0.996
  grad_clip_norm: 1.0
  log_every: 50
  objective_schedule:
    enabled: true
    reconstruction_warmup_steps: 500
    reconstruction_anneal_steps: 1000
    reconstruction_final_scale: 0.5
    warmup_non_reconstruction_scale: 0.0
loss:
  temperature: 0.1
  rna_mask: 1.0
  image_mask: 1.0
  jepa: 1.0
  align: 1.0
  mmd: 0.1
  sliced_wasserstein: 0.05
  perturbation_cls: 0.1
  batch_adv: 0.05
  counterfactual: 0.0
  cycle: 0.1
  response_bottleneck: 0.01
data:
  rna_anndata: data/processed/lincs/l1000_a549_10uM_24h.h5ad
  image_manifest: data/processed/lincs/cell_painting_manifest_10uM_48h_profiles.csv
  image_root: .
  condition_key: condition_key_lincs
  split_col: split
  train_split_value: train
  eval_split_value: test
  split_strategy: heldout_perturbation
  heldout_fraction: 0.2
  rna_bag_size: 1
  image_bag_size: 4
  min_rna_bag_size: 1
  min_image_bag_size: 1
  rna_mask_prob: 0.15
  image_patch_mask_prob: 0.15
  rna_normalize: false
synthetic:
  batch_size: 4
