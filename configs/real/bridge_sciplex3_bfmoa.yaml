name: real-bridge-sciplex3-bfmoa
data:
  rna_anndata: data/processed/sciplex3/rna_normalized.h5ad
  image_manifest: data/processed/bf_moa/image_manifest.csv
  image_root: data/raw/bf_moa_images
  max_cells: 50000
  max_images: 50000
  n_top_genes: 2048
  rna_bag_size: 64
  image_bag_size: 64
  split_strategy: heldout_perturbation
  heldout_fraction: 0.2
  rna_mask_prob: 0.15
  image_patch_mask_prob: 0.15
model:
  rna:
    dim: 128
    depth: 4
    heads: 8
    max_genes: 2048
  image:
    in_channels: 3
    image_size: 128
    patch_size: 16
    dim: 128
    depth: 4
    heads: 8
  shared_dim: 128
  num_bag_prototypes: 8
training:
  seed: 13
  device: cpu
  steps: 3000
  batch_size: 8
  log_every: 50
loss:
  align: 1.0
  mmd: 0.1
  batch_adv: 0.05
  perturbation_cls: 0.1
optimizer:
  lr: 0.0002
