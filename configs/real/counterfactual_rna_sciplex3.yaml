name: real-counterfactual-rna-sciplex3
data:
  rna_anndata: data/processed/sciplex3/rna_normalized.h5ad
  max_cells: 50000
  n_top_genes: 2048
  split_strategy: heldout_perturbation
  heldout_fraction: 0.2
model:
  rna:
    dim: 128
    depth: 4
    heads: 8
    max_genes: 2048
  shared_dim: 128
training:
  seed: 13
  device: cpu
  steps: 2000
  batch_size: 64
  log_every: 50
optimizer:
  lr: 0.0003
