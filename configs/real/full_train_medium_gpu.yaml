name: real-full-train-medium-gpu
data:
  rna_anndata: data/processed/sciplex3/rna_normalized.h5ad
  image_manifest: data/processed/bf_moa/image_manifest.csv
  image_root: data/raw/bf_moa_images
  max_cells: 100000
  max_images: 100000
  max_condition_bags: 4096
  n_top_genes: 2048
  rna_bag_size: 64
  image_bag_size: 64
  split_strategy: heldout_perturbation
  heldout_fraction: 0.2
model:
  rna:
    dim: 192
    depth: 6
    heads: 8
    max_genes: 2048
  image:
    image_size: 128
    patch_size: 16
    dim: 192
    depth: 6
    heads: 8
  shared_dim: 192
  num_bag_prototypes: 8
training:
  seed: 13
  device: cuda
  steps: 5000
  batch_size: 8
  log_every: 50
optimizer:
  lr: 0.0002
