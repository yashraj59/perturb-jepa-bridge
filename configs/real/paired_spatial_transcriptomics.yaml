name: real-paired-spatial-transcriptomics
data:
  paired_manifest: data/processed/spatial/paired_manifest.csv
  rna_anndata: data/processed/spatial/rna_normalized.h5ad
  image_manifest: data/processed/spatial/image_manifest.csv
  image_root: data/raw/spatial_images
  max_pairs: 10000
  split_strategy: random_grouped
  split_col: split
  rna_bag_size: 16
  image_bag_size: 16
pairing:
  tier: tier1_true_paired_image_expression
  key_type: spot
  split_strategy: heldout_pairing
training:
  seed: 13
  device: cpu
  steps: 1000
  batch_size: 8
  log_every: 25
