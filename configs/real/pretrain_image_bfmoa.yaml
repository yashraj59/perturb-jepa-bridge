name: real-pretrain-image-bfmoa
data:
  image_manifest: data/processed/bf_moa/image_manifest.csv
  image_root: data/raw/bf_moa_images
  max_images: 50000
  split_strategy: heldout_batch
  heldout_fraction: 0.2
  image_patch_mask_prob: 0.15
model:
  image:
    in_channels: 3
    image_size: 128
    patch_size: 16
    dim: 128
    depth: 4
    heads: 8
  shared_dim: 128
training:
  seed: 13
  device: cpu
  steps: 2000
  batch_size: 32
  log_every: 50
optimizer:
  lr: 0.0003
