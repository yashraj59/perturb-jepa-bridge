name: real-weak-paired-well-level
data:
  paired_manifest: data/processed/weak_paired/paired_manifest.csv
  rna_anndata: data/processed/weak_paired/rna_normalized.h5ad
  image_manifest: data/processed/weak_paired/image_manifest.csv
  image_root: data/raw/weak_paired_images
  max_pairs: 5000
  split_strategy: heldout_batch
  rna_bag_size: 64
  image_bag_size: 64
pairing:
  tier: tier2_weakly_paired_sample_well_condition
  key_type: well
training:
  seed: 13
  device: cpu
  steps: 1000
  batch_size: 8
  log_every: 25
